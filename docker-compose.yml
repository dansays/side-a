# Side A for Synology Container Manager (or `docker compose up -d --build`).
# Mirrors the shoppr deployment model: env file beside this compose, and the
# data volume lives OUTSIDE the project dir so deploy-nas.sh's `rsync --delete`
# never touches the SQLite db, cached thumbnails, or generated mp3s.
#
# For LOCAL dev, don't use compose — run uvicorn directly with DATA_DIR=./data
# (see README). This compose file targets the NAS.
services:
  side-a:
    build:
      context: .
      dockerfile: Dockerfile
    image: side-a-app
    container_name: side-a
    restart: unless-stopped
    env_file:
      - side-a.env
    environment:
      # Force the in-container data path onto the mounted volume. This MUST win
      # over any DATA_DIR in side-a.env (e.g. the local-dev default ./data),
      # which would otherwise write to the container's ephemeral /app/data and be
      # lost on rebuild. compose `environment` overrides `env_file`.
      - DATA_DIR=/data
    extra_hosts:
      # Containers can't resolve .local/mDNS names, so HA_BASE_URL pointed at
      # homeassistant.local fails with a NameResolutionError and aborts every
      # trigger. Map it to HA's IP here so it works even if side-a.env carries the
      # .local form. Update this IP if HA's address changes (a DHCP reservation
      # for Home Assistant avoids that).
      - "homeassistant.local:192.168.1.58"
    ports:
      - "8099:8099"
    volumes:
      - /volume1/docker/side-a/data:/data
